name: Codex PR babysitter

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: GitHub pull request number to inspect and fix
        required: true
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.comment.body || '', '@codex fix') ||
        contains(github.event.review.body || '', '@codex fix')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Capture PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_NUMBER="${DISPATCH_PR_NUMBER:-${EVENT_PR_NUMBER:-$ISSUE_PR_NUMBER}}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          git fetch --no-tags origin "+refs/pull/$PR_NUMBER/head:pr-$PR_NUMBER"
          git checkout "pr-$PR_NUMBER"
          mkdir -p .codex-run
          gh pr view "$PR_NUMBER" \
            --json number,title,body,labels,author,baseRefName,headRefName,commits,files,reviews,comments,statusCheckRollup,url \
            > .codex-run/pr.json
          gh pr diff "$PR_NUMBER" > .codex-run/pr.diff
      - name: Run Codex fix pass
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":workspace"
          prompt-file: .github/codex/prompts/fix-pr-feedback.md
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
