name: Codex PR babysitter

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: GitHub pull request number to inspect and fix
        required: true
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: signal-pr-fix-${{ inputs.pr_number || github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  fix:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'failure'
        ) ||
        (
          github.event_name == 'pull_request' &&
          github.event.label.name == 'agent:needs-fix'
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '@codex fix') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        ) ||
        (
          github.event_name == 'pull_request_review' &&
          contains(github.event.review.body, '@codex fix') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
        ) ||
        (
          github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@codex fix') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolchains and dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip uv
          cd backend && uv sync --frozen

      - name: Capture PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER="${DISPATCH_PR_NUMBER:-${EVENT_PR_NUMBER:-${ISSUE_PR_NUMBER:-$REVIEW_PR_NUMBER}}}"
          if [ -z "$PR_NUMBER" ] && [ -n "$FAILED_HEAD_BRANCH" ]; then
            PR_NUMBER="$(gh pr list --head "$FAILED_HEAD_BRANCH" --state open --json number --jq '.[0].number // ""')"
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "::notice::No open pull request found for this fix trigger."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEAD_REF="$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')"
          {
            echo "should_continue=true"
            echo "pr_number=$PR_NUMBER"
            echo "head_ref=$HEAD_REF"
          } >> "$GITHUB_OUTPUT"
          git fetch --no-tags origin "+refs/pull/$PR_NUMBER/head:pr-$PR_NUMBER"
          git checkout "pr-$PR_NUMBER"
          mkdir -p .codex-run
          gh pr view "$PR_NUMBER" \
            --json number,title,body,labels,author,baseRefName,headRefName,commits,files,reviews,comments,url \
            > .codex-run/pr.json
          gh pr diff "$PR_NUMBER" > .codex-run/pr.diff

      - name: Prepare fix pass budget
        id: fixpass
        if: ${{ steps.context.outputs.should_continue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          CI_FAILURE: ${{ github.event_name == 'workflow_run' }}
        run: bash .github/scripts/prepare-fix-pass.sh

      - name: Check OpenAI key
        id: openai
        if: ${{ steps.fixpass.outputs.should_run == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Skipping Codex fix pass. Add OPENAI_API_KEY as a repository Actions secret."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex fix pass
        id: codex
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.5
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: .codex-run/codex-fix-pass.md
          prompt-file: .github/codex/prompts/fix-pr-feedback.md
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}

      - name: Commit and push fix pass
        if: ${{ steps.openai.outputs.available == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          NEXT_PASS: ${{ steps.fixpass.outputs.next_pass }}
          VERIFICATION_SUMMARY: ${{ steps.codex.outputs.final-message }}
          FIX_PASS_COUNT: ${{ steps.fixpass.outputs.next_pass }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            LOOP_STATUS="no_changes" BLOCKERS="Codex fix pass produced no file changes." \
              bash .github/scripts/write-loop-result.sh
            gh pr edit "$PR_NUMBER" --add-label "agent:needs-human" || true
            gh pr comment "$PR_NUMBER" --body "Codex fix pass $NEXT_PASS completed without file changes. Marking for human review."
            exit 0
          fi

          git diff --name-only > .codex-run/changed-files.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(agents): address PR ${PR_NUMBER} feedback"
          git push origin "HEAD:${HEAD_REF}"
          source .github/scripts/agent-loop-common.sh
          apply_pr_labels "$PR_NUMBER" \
            "agent:fix-pass-${NEXT_PASS},agent:reviewing,review:codex" \
            "agent:needs-fix,ci:failed,agent:blocked"
          LOOP_STATUS="completed" BLOCKERS="" \
            bash .github/scripts/write-loop-result.sh

      - name: Upload fix artifact
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-fix-${{ steps.context.outputs.pr_number }}-${{ steps.fixpass.outputs.next_pass }}
          path: .codex-run/
          if-no-files-found: ignore

      - name: Report workflow failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "agent:blocked" || true
            gh pr comment "$PR_NUMBER" --body "Codex fix pass failed in GitHub Actions. Check the workflow run logs before retrying."
          fi
