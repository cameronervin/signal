name: Codex PR babysitter

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: GitHub pull request number to inspect and fix
        required: true
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: signal-pr-fix-${{ inputs.pr_number || github.event.pull_request.head.ref || github.event.issue.number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  fix:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'failure'
        ) ||
        (
          github.event_name == 'pull_request' &&
          github.event.label.name == 'agent:needs-fix'
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '@codex fix') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        ) ||
        (
          github.event_name == 'pull_request_review' &&
          contains(github.event.review.body, '@codex fix') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
        ) ||
        (
          github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@codex fix') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Capture and validate PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          FAILED_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          FAILED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PR_NUMBER="${DISPATCH_PR_NUMBER:-${EVENT_PR_NUMBER:-${ISSUE_PR_NUMBER:-$REVIEW_PR_NUMBER}}}"
          if [ -z "$PR_NUMBER" ] && [ -n "$FAILED_HEAD_BRANCH" ]; then
            PR_NUMBER="$(gh pr list --head "$FAILED_HEAD_BRANCH" --state open --json number --jq '.[0].number // ""')"
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "::notice::No open pull request found for this fix trigger."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p .codex-run
          gh pr view "$PR_NUMBER" \
            --json number,title,body,labels,author,baseRefName,headRefName,headRefOid,headRepository,headRepositoryOwner,isCrossRepository,commits,files,reviews,comments,url \
            > .codex-run/pr.json
          gh pr diff "$PR_NUMBER" > .codex-run/pr.diff

          HEAD_REF="$(jq -r '.headRefName' .codex-run/pr.json)"
          HEAD_SHA="$(jq -r '.headRefOid' .codex-run/pr.json)"
          HEAD_REPOSITORY="$(jq -r '.headRepository.nameWithOwner' .codex-run/pr.json)"
          IS_CROSS_REPOSITORY="$(jq -r '.isCrossRepository' .codex-run/pr.json)"
          HAS_CODEX_REVIEW="$(jq -r 'any(.labels[]?; .name == "review:codex")' .codex-run/pr.json)"
          HAS_AGENT_FIX="$(jq -r 'any(.labels[]?; .name == "agent:needs-fix")' .codex-run/pr.json)"
          HAS_AGENT_REVIEW="$(jq -r 'any(.labels[]?; .name == "agent:reviewing")' .codex-run/pr.json)"

          if [[ "$IS_CROSS_REPOSITORY" != "false" || "$HEAD_REPOSITORY" != "$GITHUB_REPOSITORY" ]]; then
            echo "::notice::Skipping Codex fix pass for PR #$PR_NUMBER because the head repository is not the base repository."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$HEAD_REF" != codex/* ]]; then
            echo "::notice::Skipping Codex fix pass for PR #$PR_NUMBER because the head branch is not agent-owned."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$EVENT_NAME" == "workflow_run" && -n "$FAILED_HEAD_SHA" && "$FAILED_HEAD_SHA" != "$HEAD_SHA" ]]; then
            echo "::notice::Skipping Codex fix pass for PR #$PR_NUMBER because the failed CI head SHA no longer matches the PR head."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$HAS_CODEX_REVIEW" != "true" || ( "$HAS_AGENT_FIX" != "true" && "$HAS_AGENT_REVIEW" != "true" ) ]]; then
            echo "::notice::Skipping Codex fix pass for PR #$PR_NUMBER because it is not an agent loop PR."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "should_continue=true"
            echo "pr_number=$PR_NUMBER"
            echo "head_ref=$HEAD_REF"
            echo "head_repository=$HEAD_REPOSITORY"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare fix pass budget
        id: fixpass
        if: ${{ steps.context.outputs.should_continue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          CI_FAILURE: ${{ github.event_name == 'workflow_run' }}
        run: |
          max_passes=2
          labels_json="$(gh pr view "$PR_NUMBER" --json labels)"
          current_pass=0
          for pass in $(seq 1 "$max_passes"); do
            if jq -e --arg label "agent:fix-pass-$pass" \
              'any(.labels[]?; .name == $label)' <<< "$labels_json" >/dev/null; then
              current_pass="$pass"
            fi
          done

          if [[ "$current_pass" -ge "$max_passes" ]]; then
            gh pr edit "$PR_NUMBER" --remove-label "agent:needs-fix" || true
            gh pr edit "$PR_NUMBER" --add-label "agent:blocked" || true
            gh pr comment "$PR_NUMBER" --body "Codex fix pass budget is exhausted after $max_passes attempts. Marking this PR blocked for human review."
            {
              echo "should_run=false"
              echo "next_pass=$current_pass"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          next_pass=$((current_pass + 1))
          if [[ "$CI_FAILURE" == "true" ]]; then
            gh pr edit "$PR_NUMBER" --add-label "ci:failed" --remove-label "agent:blocked" || true
          else
            gh pr edit "$PR_NUMBER" --add-label "agent:needs-fix" --remove-label "agent:blocked" || true
          fi

          {
            echo "should_run=true"
            echo "next_pass=$next_pass"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare trusted fix prompt
        if: ${{ steps.fixpass.outputs.should_run == 'true' }}
        run: |
          cat > "$RUNNER_TEMP/fix-pr-feedback.md" <<'PROMPT'
          You are the Signal fix-pass agent.

          Address actionable review comments and failing checks only. Do not expand scope or begin unrelated work.

          Required context:
          - `AGENTS.md`
          - `.codex-run/pr.json`
          - `.codex-run/pr.diff`
          - The PR title, body, review comments, unresolved threads, and CI failures
          - The original linked issue
          - Relevant loop and rule files under `.agents/`

          Workflow:
          1. List unresolved comments and failing checks.
          2. Decide whether each item is actionable, already resolved, or requires human review.
          3. Make the smallest changes needed for actionable items.
          4. Run targeted verification.
          5. Leave all edits in the working tree. The workflow will commit and push.
          6. Reply with what was fixed, what was verified, and what still needs a human.

          Boundaries:
          - Do not change scoring weights or thresholds unless the PR already carries explicit human approval for that change.
          - Do not bypass product, outreach, high-risk, or automerge policy gates.
          - Do not resolve review comments by deleting coverage or weakening assertions.
          - Do not merge the PR; only the automerge workflow may merge.

          End with:

          ```text
          LOOP_STATUS: completed | blocked
          DOCS_UPDATED: yes | no | not-needed
          BLOCKERS: none | <short blocker>
          ```
          PROMPT

      - uses: actions/setup-node@v4
        if: ${{ steps.fixpass.outputs.should_run == 'true' }}
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        if: ${{ steps.fixpass.outputs.should_run == 'true' }}
        with:
          python-version: "3.12"

      - name: Install toolchains and dependencies
        if: ${{ steps.fixpass.outputs.should_run == 'true' }}
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip uv
          cd backend && uv sync --frozen

      - name: Check OpenAI key
        id: openai
        if: ${{ steps.fixpass.outputs.should_run == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Skipping Codex fix pass. Add OPENAI_API_KEY as a repository Actions secret."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout trusted PR head
        if: ${{ steps.openai.outputs.available == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            fetch --no-tags origin "+refs/pull/$PR_NUMBER/head:pr-$PR_NUMBER"
          git checkout "pr-$PR_NUMBER"

      - name: Run Codex fix pass
        id: codex
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.5
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: .codex-run/codex-fix-pass.md
          prompt-file: ${{ runner.temp }}/fix-pr-feedback.md
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}

      - name: Prepare fix patch
        id: fix_patch
        if: ${{ steps.openai.outputs.available == 'true' }}
        run: |
          mkdir -p .codex-run
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -c core.hooksPath=/dev/null add -A
          git -c core.hooksPath=/dev/null diff --cached --name-only > .codex-run/changed-files.txt
          git -c core.hooksPath=/dev/null diff --cached --binary > "$RUNNER_TEMP/agent.patch"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push fix pass
        if: ${{ steps.openai.outputs.available == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          NEXT_PASS: ${{ steps.fixpass.outputs.next_pass }}
          VERIFICATION_SUMMARY: ${{ steps.codex.outputs.final-message }}
          FIX_PASS_COUNT: ${{ steps.fixpass.outputs.next_pass }}
          HAS_CHANGES: ${{ steps.fix_patch.outputs.has_changes }}
        run: |
          write_loop_result() {
            local status="$1"
            local blockers="$2"
            mkdir -p .codex-run
            if [[ -f .codex-run/changed-files.txt ]]; then
              changed_files_json="$(jq -R -s 'split("\n") | map(select(length > 0))' .codex-run/changed-files.txt)"
            else
              changed_files_json="[]"
            fi
            jq -n \
              --arg issue_number "" \
              --arg pr_number "$PR_NUMBER" \
              --arg loop "" \
              --arg status "$status" \
              --arg model "gpt-5.5" \
              --arg started_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg completed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg verification "$VERIFICATION_SUMMARY" \
              --arg docs_updated "not reported" \
              --arg blockers "$blockers" \
              --arg fix_pass_count "$FIX_PASS_COUNT" \
              --argjson changed_files "$changed_files_json" \
              '{
                issue_number: $issue_number,
                pr_number: $pr_number,
                loop: $loop,
                status: $status,
                model: $model,
                started_at: $started_at,
                completed_at: $completed_at,
                changed_files: $changed_files,
                verification: $verification,
                docs_updated: $docs_updated,
                risks: [],
                blockers: $blockers,
                fix_pass_count: ($fix_pass_count | tonumber? // 0)
              }' > .codex-run/loop-result.json
          }

          if [[ "$HAS_CHANGES" != "true" ]]; then
            write_loop_result "no_changes" "Codex fix pass produced no file changes."
            gh pr edit "$PR_NUMBER" --add-label "agent:needs-human" || true
            gh pr comment "$PR_NUMBER" --body "Codex fix pass $NEXT_PASS completed without file changes. Marking for human review."
            exit 0
          fi

          auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          trusted_dir="$RUNNER_TEMP/trusted-fix-commit"
          rm -rf "$trusted_dir"
          git \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            clone --no-checkout "https://github.com/${GITHUB_REPOSITORY}.git" "$trusted_dir"
          cd "$trusted_dir"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" fetch origin "$HEAD_REF"
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
          git apply --binary "$RUNNER_TEMP/agent.patch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -c core.hooksPath=/dev/null add -A
          git -c core.hooksPath=/dev/null commit -m "fix(agents): address PR ${PR_NUMBER} feedback"
          # Safe because the context step rejects forks and non-codex branches.
          git \
            -c core.hooksPath=/dev/null \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            push origin "HEAD:${HEAD_REF}"
          cd "$GITHUB_WORKSPACE"

          gh pr edit "$PR_NUMBER" --remove-label "agent:needs-fix,ci:failed,agent:blocked" || true
          gh pr edit "$PR_NUMBER" --add-label "agent:fix-pass-${NEXT_PASS},agent:reviewing,review:codex" || true
          write_loop_result "completed" ""

      - name: Upload fix artifact
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-fix-${{ steps.context.outputs.pr_number }}-${{ steps.fixpass.outputs.next_pass }}
          path: .codex-run/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Report workflow failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "agent:blocked" || true
            gh pr comment "$PR_NUMBER" --body "Codex fix pass failed in GitHub Actions. Check the workflow run logs before retrying."
          fi
