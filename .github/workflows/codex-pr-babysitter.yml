name: Codex PR babysitter

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: GitHub pull request number to inspect and fix
        required: true
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '@codex fix')
        ) ||
        (
          github.event_name == 'pull_request_review' &&
          contains(github.event.review.body, '@codex fix')
        ) ||
        (
          github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@codex fix')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install toolchains and dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip uv
          cd backend && uv sync --frozen
      - name: Capture PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_NUMBER="${DISPATCH_PR_NUMBER:-${EVENT_PR_NUMBER:-$ISSUE_PR_NUMBER}}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          HEAD_REF="$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          git fetch --no-tags origin "+refs/pull/$PR_NUMBER/head:pr-$PR_NUMBER"
          git checkout "pr-$PR_NUMBER"
          mkdir -p .codex-run
          gh pr view "$PR_NUMBER" \
            --json number,title,body,labels,author,baseRefName,headRefName,commits,files,reviews,comments,url \
            > .codex-run/pr.json
          gh pr diff "$PR_NUMBER" > .codex-run/pr.diff
      - name: Run Codex fix pass
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.5
          permission-profile: ":workspace"
          prompt-file: .github/codex/prompts/fix-pr-feedback.md
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
      - name: Commit and push fix pass
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No file changes produced by fix pass."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(agents): address PR ${PR_NUMBER} feedback"
          git push origin "HEAD:${HEAD_REF}"
      - name: Report workflow failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "agent:blocked" || true
            gh pr comment "$PR_NUMBER" --body "Codex fix pass failed in GitHub Actions. Check the workflow run logs before retrying."
          fi
