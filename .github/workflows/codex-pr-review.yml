name: Codex PR review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: GitHub pull request number to review
        required: true
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: signal-pr-review-${{ inputs.pr_number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.draft == false &&
          contains(github.event.pull_request.labels.*.name, 'review:codex')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
      pr_number: ${{ steps.context.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Capture PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_NUMBER="${EVENT_PR_NUMBER:-$DISPATCH_PR_NUMBER}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          git fetch --no-tags origin \
            "+refs/pull/$PR_NUMBER/merge:refs/remotes/pull/$PR_NUMBER/merge" \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/pull/$PR_NUMBER/head"
          git checkout "refs/remotes/pull/$PR_NUMBER/merge" || git checkout "refs/remotes/pull/$PR_NUMBER/head"
          mkdir -p .codex-run
          gh pr view "$PR_NUMBER" \
            --json number,title,body,labels,author,baseRefName,headRefName,commits,files,reviews,comments,url \
            > .codex-run/pr.json
          gh pr diff "$PR_NUMBER" > .codex-run/pr.diff

      - name: Check OpenAI key
        id: openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Skipping Codex PR review. Add OPENAI_API_KEY as a repository Actions secret."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        id: codex
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.5
          sandbox: read-only
          safety-strategy: drop-sudo
          output-file: .codex-run/codex-review.md
          prompt-file: .github/codex/prompts/review-pr.md
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}

      - name: Post review comment
        if: ${{ steps.openai.outputs.available == 'true' && steps.codex.outputs.final-message != '' }}
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.CODEX_FINAL_MESSAGE,
            });

      - name: Apply review state labels
        if: ${{ steps.openai.outputs.available == 'true' && steps.codex.outputs.final-message != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        run: bash .github/scripts/apply-review-state.sh

      - name: Write review loop artifact
        if: ${{ steps.openai.outputs.available == 'true' }}
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          LOOP_STATUS: review
          VERIFICATION_SUMMARY: ${{ steps.codex.outputs.final-message }}
          FIX_PASS_COUNT: "0"
        run: bash .github/scripts/write-loop-result.sh

      - name: Upload review artifact
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ steps.context.outputs.pr_number }}
          path: .codex-run/
          if-no-files-found: ignore
