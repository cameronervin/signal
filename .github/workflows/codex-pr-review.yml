name: Codex PR review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: GitHub pull request number to review
        required: true
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: signal-pr-review-${{ inputs.pr_number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.draft == false &&
          contains(github.event.pull_request.labels.*.name, 'review:codex') &&
          (
            github.event.action != 'labeled' ||
            github.event.label.name == 'review:codex'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
      pr_number: ${{ steps.context.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Capture PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_NUMBER="${EVENT_PR_NUMBER:-$DISPATCH_PR_NUMBER}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          mkdir -p .codex-run
          gh pr view "$PR_NUMBER" \
            --json number,title,body,labels,author,baseRefName,headRefName,commits,files,reviews,comments,url,statusCheckRollup,closingIssuesReferences \
            > .codex-run/pr.json
          gh pr diff "$PR_NUMBER" > .codex-run/pr.diff
          linked_issues="$(jq -r '.closingIssuesReferences[]?.number' .codex-run/pr.json)"
          if [ -z "$linked_issues" ]; then
            echo "[]" > .codex-run/linked-issues.json
          else
            tmp_issues="$(mktemp -d)"
            for issue_number in $linked_issues; do
              gh issue view "$issue_number" \
                --json number,title,body,labels,state,url,comments \
                > "$tmp_issues/$issue_number.json"
            done
            jq -s '.' "$tmp_issues"/*.json > .codex-run/linked-issues.json
          fi

      - name: Prepare trusted review prompt
        run: |
          cat > "$RUNNER_TEMP/review-pr.md" <<'PROMPT'
          You are the Signal PR review agent.

          Review only the changes introduced by this PR. Use a findings-first code-review stance and order findings by severity.

          Required context:
          - `AGENTS.md`
          - `.codex-run/pr.json`
          - `.codex-run/pr.diff`
          - `.codex-run/linked-issues.json`
          - Relevant rules under `.agents/rules/`
          - The PR title, body, changed files, commits, and linked issue

          Review principles:
          - Judge whether the PR satisfies the linked issue and preserves Signal's documented architecture.
          - Prefer first-principles engineering review: clear ownership boundaries, simple cohesive services, explicit contracts, low coupling, and no needless duplication.
          - Treat production maintainability as part of correctness. Flag code that is hard to reason about, hard to extend safely, or likely to force rewrites in adjacent planned issues.
          - Review only behavior changed by this PR. Do not block on pre-existing gaps, speculative future enhancements, or a different implementation style when the submitted design is correct, maintainable, and aligned with local patterns.

          Review checklist:
          - Routes stay thin and services own orchestration.
          - DTOs and service boundaries remain typed, explicit, and stable.
          - Code follows SOLID/DRY where it matters: no duplicated domain rules, no over-broad classes/functions, no hidden coupling between agents, integrations, repositories, and API routes.
          - Score, tier, gate status, and draft eligibility are server-computed.
          - Hard-gate-failed leads never expose drafts.
          - Public API and integration paths preserve source facts, sanitized errors, and reliable production behavior required by the linked issue.
          - Logs avoid secrets, full emails, draft text, prompts, and raw payloads.
          - Tests prove the requested behavior and important edge cases introduced by the PR.
          - Docs changed when contracts, architecture, or behavior changed.
          - Frontend surfaces preserve accessible names, text fit, and gate-failed states.
          - Workflow control-plane prompts and scripts do not run from PR- or agent-modified workspaces with write tokens.

          Output:
          Lead with findings:
          - `P0`: security issue, secret leak, data loss, or automatic send behavior.
          - `P1`: the PR does not satisfy the linked issue, breaks an existing user-facing/API contract, violates core architecture boundaries, causes incorrect scoring/gating, breaks the lead trigger, or generates/exposes a draft for a failed gate.
          - `P2`: maintainability, SOLID/DRY, test, documentation, or integration reliability issue that materially affects the changed scope or makes the implementation unsafe to build on.
          - `P3`: style, naming, minor readability, or small accessibility issue.

          Blocking guidance:
          - Use `needs-fix` only for actionable P0/P1 findings, or P2 findings that materially affect production correctness, maintainability, or the ability to build the next planned issue on this work.
          - Use `human` when the PR needs product, credential, scoring-threshold, architecture, or merge judgment that cannot be resolved from the issue and repo docs.
          - Use `clear` when the PR satisfies the issue, respects the architecture, is maintainable, and has adequate tests/docs for the changed behavior.

          If no findings, say that clearly and note residual test or manual verification gaps.

          End with exactly one status line:

          ```text
          REVIEW_STATUS: needs-fix | clear | human
          ```
          PROMPT

      - name: Check OpenAI key
        id: openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Skipping Codex PR review. Add OPENAI_API_KEY as a repository Actions secret."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Codex review
        id: codex
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.5
          sandbox: read-only
          safety-strategy: drop-sudo
          output-file: .codex-run/codex-review.md
          prompt-file: ${{ runner.temp }}/review-pr.md
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}

      - name: Require Codex review output
        if: ${{ steps.openai.outputs.available != 'true' || steps.codex.outputs.final-message == '' }}
        run: |
          echo "::error::Codex review is required before this PR can be AI-merged."
          exit 1

      - name: Post review comment
        if: ${{ steps.openai.outputs.available == 'true' && steps.codex.outputs.final-message != '' }}
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.CODEX_FINAL_MESSAGE,
            });

      - name: Apply review state labels
        if: ${{ steps.openai.outputs.available == 'true' && steps.codex.outputs.final-message != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        run: |
          message_file="$(mktemp)"
          printf '%s\n' "$CODEX_FINAL_MESSAGE" > "$message_file"

          apply_labels() {
            local add_csv="$1"
            local remove_csv="$2"
            if [[ -n "$remove_csv" ]]; then
              gh pr edit "$PR_NUMBER" --remove-label "$remove_csv" || true
            fi
            if [[ -n "$add_csv" ]]; then
              gh pr edit "$PR_NUMBER" --add-label "$add_csv"
            fi
          }

          if grep -Eq '^REVIEW_STATUS:[[:space:]]*needs-fix' "$message_file"; then
            apply_labels "agent:needs-fix" "agent:merge-ready,ci:passing,review:codex-clear"
          elif grep -Eq '^REVIEW_STATUS:[[:space:]]*human' "$message_file"; then
            apply_labels "review:human,agent:needs-human" "agent:merge-ready,review:codex-clear"
          elif grep -Eq '^REVIEW_STATUS:[[:space:]]*clear' "$message_file"; then
            pr_state="$(gh pr view "$PR_NUMBER" --json labels,statusCheckRollup)"
            needs_human="$(jq -r 'any(.labels[]?; .name == "review:human")' <<< "$pr_state")"
            backend_ok="$(jq -r 'any(.statusCheckRollup[]?; .name == "backend" and .conclusion == "SUCCESS")' <<< "$pr_state")"
            frontend_ok="$(jq -r 'any(.statusCheckRollup[]?; .name == "frontend" and .conclusion == "SUCCESS")' <<< "$pr_state")"

            if [[ "$needs_human" == "true" ]]; then
              apply_labels "review:codex-clear" "agent:merge-ready,agent:needs-fix,ci:failed"
            elif [[ "$backend_ok" == "true" && "$frontend_ok" == "true" ]]; then
              apply_labels "review:codex-clear,agent:merge-ready,ci:passing" "agent:reviewing,agent:needs-fix,ci:failed"
            else
              apply_labels "review:codex-clear,agent:reviewing" "agent:merge-ready,agent:needs-fix,ci:failed"
            fi
          else
            apply_labels "agent:needs-human" ""
          fi

      - name: Write review loop artifact
        if: ${{ steps.openai.outputs.available == 'true' }}
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          LOOP_STATUS: review
          VERIFICATION_SUMMARY: ${{ steps.codex.outputs.final-message }}
          FIX_PASS_COUNT: "0"
        run: |
          mkdir -p .codex-run
          jq -n \
            --arg issue_number "" \
            --arg pr_number "$PR_NUMBER" \
            --arg loop "" \
            --arg status "$LOOP_STATUS" \
            --arg model "gpt-5.5" \
            --arg started_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg completed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg verification "$VERIFICATION_SUMMARY" \
            --arg docs_updated "not reported" \
            --arg blockers "" \
            --arg fix_pass_count "$FIX_PASS_COUNT" \
            '{
              issue_number: $issue_number,
              pr_number: $pr_number,
              loop: $loop,
              status: $status,
              model: $model,
              started_at: $started_at,
              completed_at: $completed_at,
              changed_files: [],
              verification: $verification,
              docs_updated: $docs_updated,
              risks: [],
              blockers: $blockers,
              fix_pass_count: ($fix_pass_count | tonumber? // 0)
            }' > .codex-run/loop-result.json

      - name: Upload review artifact
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ steps.context.outputs.pr_number }}
          path: .codex-run/
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Enforce clear Codex review
        if: ${{ steps.openai.outputs.available == 'true' && steps.codex.outputs.final-message != '' }}
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        run: |
          message_file="$(mktemp)"
          printf '%s\n' "$CODEX_FINAL_MESSAGE" > "$message_file"

          if grep -Eq '^REVIEW_STATUS:[[:space:]]*clear' "$message_file"; then
            exit 0
          fi
          echo "::error::Codex review did not clear this PR."
          exit 1

  reconcile-ci:
    if: >-
      ${{
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Reconcile clear review with passing CI
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -z "$HEAD_BRANCH" ]; then
            echo "::notice::No workflow_run head branch found for CI reconciliation."
            exit 0
          fi

          PR_NUMBER="$(gh pr list --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -z "$PR_NUMBER" ]; then
            echo "::notice::No open PR found for CI head branch $HEAD_BRANCH."
            exit 0
          fi

          mkdir -p .codex-run
          gh pr view "$PR_NUMBER" \
            --json labels,statusCheckRollup,headRefName,headRepository,isCrossRepository \
            > .codex-run/pr.json

          head_ref="$(jq -r '.headRefName' .codex-run/pr.json)"
          head_repository="$(jq -r '.headRepository.nameWithOwner' .codex-run/pr.json)"
          is_cross_repository="$(jq -r '.isCrossRepository' .codex-run/pr.json)"
          has_codex_review="$(jq -r 'any(.labels[]?; .name == "review:codex")' .codex-run/pr.json)"
          has_clear_review="$(jq -r 'any(.labels[]?; .name == "review:codex-clear")' .codex-run/pr.json)"
          needs_human="$(jq -r 'any(.labels[]?; .name == "review:human" or .name == "agent:needs-human")' .codex-run/pr.json)"
          needs_fix="$(jq -r 'any(.labels[]?; .name == "agent:needs-fix")' .codex-run/pr.json)"
          backend_ok="$(jq -r 'any(.statusCheckRollup[]?; .name == "backend" and .conclusion == "SUCCESS")' .codex-run/pr.json)"
          frontend_ok="$(jq -r 'any(.statusCheckRollup[]?; .name == "frontend" and .conclusion == "SUCCESS")' .codex-run/pr.json)"

          if [[ "$is_cross_repository" != "false" || "$head_repository" != "$GITHUB_REPOSITORY" || "$head_ref" != codex/* ]]; then
            echo "::notice::Skipping CI reconciliation for non-agent or cross-repository PR #$PR_NUMBER."
            exit 0
          fi
          if [[ "$has_codex_review" == "true" && "$has_clear_review" == "true" && "$needs_human" != "true" && "$needs_fix" != "true" && "$backend_ok" == "true" && "$frontend_ok" == "true" ]]; then
            gh pr edit "$PR_NUMBER" --remove-label "agent:reviewing,ci:failed" || true
            gh pr edit "$PR_NUMBER" --add-label "agent:merge-ready,ci:passing"
          else
            echo "::notice::PR #$PR_NUMBER is not ready for merge-state reconciliation."
          fi
