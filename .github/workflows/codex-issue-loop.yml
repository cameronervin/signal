name: Codex issue loop

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to implement
        required: true
      loop:
        description: Loop name, such as feature-build or bugfix
        required: true
        default: feature-build

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install toolchains and dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip uv
          cd backend && uv sync --frozen
      - name: Capture issue context
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          mkdir -p .codex-run
          gh issue view "$ISSUE_NUMBER" \
            --json number,title,body,labels,milestone,assignees,url \
            > .codex-run/issue.json
          ISSUE_TITLE="$(jq -r '.title' .codex-run/issue.json)"
          SLUG="$(printf '%s' "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//' | cut -c1-48)"
          BRANCH="codex/issue-${ISSUE_NUMBER}-${SLUG:-work}"
          echo "title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:ready" --add-label "agent:working" || true
      - name: Run Codex implementation loop
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":workspace"
          prompt-file: .github/codex/prompts/implement-issue.md
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          LOOP: ${{ inputs.loop }}
      - name: Commit, push, and open pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          BRANCH: ${{ steps.issue.outputs.branch }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop completed without producing file changes. Marking for human review."
            gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:needs-human" || true
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(agents): implement issue ${ISSUE_NUMBER}"
          git push --set-upstream origin "$BRANCH"
          PR_URL="$(gh pr create \
            --title "Loop #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --label "review:codex" \
            --label "agent:reviewing")"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:reviewing" || true
      - name: Report workflow failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:blocked" || true
          gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop failed in GitHub Actions. Check the workflow run logs before retrying."
