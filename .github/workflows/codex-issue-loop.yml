name: Codex issue loop

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to implement
        required: true
      loop:
        description: Loop name, such as feature-build or bugfix
        required: true
        default: feature-build
  issues:
    types: [labeled, assigned]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: signal-issue-loop-${{ inputs.issue_number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      should_publish: ${{ steps.implementation_patch.outputs.has_changes }}
      openai_available: ${{ steps.openai.outputs.available }}
      issue_number: ${{ steps.issue.outputs.number }}
      issue_title: ${{ steps.issue.outputs.title }}
      branch: ${{ steps.issue.outputs.branch }}
      loop: ${{ steps.normalize.outputs.loop }}
      risk_labels: ${{ steps.normalize.outputs.risk_labels }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Resolve issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_ISSUE_NUMBER: ${{ inputs.issue_number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          mkdir -p .codex-run
          ISSUE_NUMBER="${DISPATCH_ISSUE_NUMBER:-$EVENT_ISSUE_NUMBER}"
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::notice::No issue number found for this event."
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh issue view "$ISSUE_NUMBER" \
            --json number,title,body,labels,milestone,assignees,url \
            > .codex-run/issue.json

          ISSUE_TITLE="$(jq -r '.title' .codex-run/issue.json)"
          SLUG="$(printf '%s' "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//' | cut -c1-48)"
          BRANCH="codex/issue-${ISSUE_NUMBER}-${SLUG:-work}"

          {
            echo "should_continue=true"
            echo "number=$ISSUE_NUMBER"
            echo "title=$ISSUE_TITLE"
            echo "branch=$BRANCH"
          } >> "$GITHUB_OUTPUT"

      - name: Normalize and validate issue
        id: normalize
        if: ${{ steps.issue.outputs.should_continue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_LOOP: ${{ inputs.loop }}
        run: bash .github/scripts/normalize-agent-issue.sh

      - name: Enforce issue loop concurrency cap
        if: ${{ steps.normalize.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          max_loops="$(jq -r '.defaults.max_concurrent_issue_loops // 2' .agents/loops/manifest.yml)"
          if ! [[ "$max_loops" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Invalid max_concurrent_issue_loops value: $max_loops"
            exit 1
          fi

          attempts=0
          max_attempts=30
          while true; do
            gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/codex-issue-loop.yml/runs?status=in_progress&per_page=100" \
              > .codex-run/issue-loop-runs.json

            slot_status="$(jq -r \
              --argjson current "$GITHUB_RUN_ID" \
              --argjson max "$max_loops" \
              '
                [.workflow_runs[] | select(.status == "in_progress")]
                | sort_by(.created_at, .id)
                | map(.id) as $ids
                | ($ids | index($current)) as $idx
                | if $idx == null then "missing"
                  elif $idx < $max then "proceed"
                  else "wait"
                  end
              ' .codex-run/issue-loop-runs.json)"

            if [[ "$slot_status" == "proceed" ]]; then
              echo "Issue loop concurrency slot acquired."
              exit 0
            fi

            attempts=$((attempts + 1))
            if (( attempts >= max_attempts )); then
              gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop could not acquire an issue-loop concurrency slot within 30 minutes. Leaving this issue blocked for retry."
              gh issue edit "$ISSUE_NUMBER" --remove-label "agent:ready,agent:working" --add-label "agent:blocked" || true
              echo "::error::Timed out waiting for issue-loop concurrency slot."
              exit 1
            fi

            echo "Waiting for issue-loop concurrency slot (${attempts}/${max_attempts})."
            sleep 60
          done

      - name: Check OpenAI key
        id: openai
        if: ${{ steps.normalize.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice::Skipping Codex issue loop. Add OPENAI_API_KEY as a repository Actions secret to run coding agents."
            gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop is ready, but OPENAI_API_KEY is not configured as a repository Actions secret. Add the secret and rerun this workflow."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: ${{ steps.openai.outputs.available == 'true' }}
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        if: ${{ steps.openai.outputs.available == 'true' }}
        with:
          python-version: "3.12"

      - name: Install toolchains and dependencies
        if: ${{ steps.openai.outputs.available == 'true' }}
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip uv
          cd backend && uv sync --frozen

      - name: Prepare trusted control files
        if: ${{ steps.openai.outputs.available == 'true' }}
        run: |
          mkdir -p "$RUNNER_TEMP/agent-control"
          cp .github/scripts/write-loop-result.sh "$RUNNER_TEMP/agent-control/"
          cp .github/scripts/update-loop-pr-body.sh "$RUNNER_TEMP/agent-control/"
          cp .github/codex/prompts/implement-issue.md "$RUNNER_TEMP/agent-control/"

      - name: Prepare branch
        if: ${{ steps.openai.outputs.available == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          BRANCH: ${{ steps.issue.outputs.branch }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          if git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:ready,agent:needs-human,agent:blocked" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "agent:working" || true

      - name: Run Codex implementation loop
        id: codex
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.5
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: .codex-run/codex-implementation.md
          prompt-file: ${{ runner.temp }}/agent-control/implement-issue.md
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          LOOP: ${{ steps.normalize.outputs.loop }}

      - name: Prepare implementation patch
        id: implementation_patch
        if: ${{ steps.openai.outputs.available == 'true' }}
        run: |
          mkdir -p .codex-run
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -c core.hooksPath=/dev/null add -A
          git -c core.hooksPath=/dev/null diff --cached --name-only > .codex-run/changed-files.txt
          git -c core.hooksPath=/dev/null diff --cached --binary > .codex-run/agent.patch
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload loop artifact
        if: ${{ steps.openai.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: issue-loop-${{ steps.issue.outputs.number }}
          path: .codex-run/
          if-no-files-found: ignore
          include-hidden-files: true

  publish:
    needs: implement
    if: ${{ needs.implement.outputs.openai_available == 'true' && needs.implement.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          name: issue-loop-${{ needs.implement.outputs.issue_number }}
          path: .codex-run/

      - name: Prepare trusted control files
        run: |
          mkdir -p "$RUNNER_TEMP/agent-control"
          cp .github/scripts/write-loop-result.sh "$RUNNER_TEMP/agent-control/"
          cp .github/scripts/update-loop-pr-body.sh "$RUNNER_TEMP/agent-control/"

      - name: Require agent GitHub token
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT_GITHUB_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.implement.outputs.issue_number }}
        run: |
          if [ -z "$AGENT_GITHUB_TOKEN" ]; then
            gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:blocked" || true
            gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop needs AGENT_GITHUB_TOKEN to publish PRs that trigger CI and Codex review. Add the repository secret, then retry this issue."
            echo "::error::AGENT_GITHUB_TOKEN is required for autonomous issue-loop publishing."
            exit 1
          fi

      - name: Commit, push, and open pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ISSUE_NUMBER: ${{ needs.implement.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.implement.outputs.issue_title }}
          BRANCH: ${{ needs.implement.outputs.branch }}
          LOOP: ${{ needs.implement.outputs.loop }}
          RISK_LABELS: ${{ needs.implement.outputs.risk_labels }}
        run: |
          VERIFICATION_SUMMARY="$(cat .codex-run/codex-implementation.md 2>/dev/null || true)"
          export VERIFICATION_SUMMARY
          auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          trusted_dir="$RUNNER_TEMP/trusted-issue-commit"
          rm -rf "$trusted_dir"
          git \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            clone --no-checkout "https://github.com/${GITHUB_REPOSITORY}.git" "$trusted_dir"
          cd "$trusted_dir"
          if git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH" "origin/$DEFAULT_BRANCH"
          fi

          git apply --binary "$GITHUB_WORKSPACE/.codex-run/agent.patch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -c core.hooksPath=/dev/null add -A
          git -c core.hooksPath=/dev/null commit -m "chore(agents): implement issue ${ISSUE_NUMBER}"
          git \
            -c core.hooksPath=/dev/null \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            push --set-upstream origin "$BRANCH"
          cd "$GITHUB_WORKSPACE"

          PR_URL="$(gh pr create \
            --title "Loop #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}" \
            --head "$BRANCH" \
            --base "$DEFAULT_BRANCH" \
            --label "review:codex" \
            --label "agent:reviewing")"
          PR_NUMBER="${PR_URL##*/}"
          {
            echo "created=true"
            echo "number=$PR_NUMBER"
            echo "url=$PR_URL"
          } >> "$GITHUB_OUTPUT"
          PR_NUMBER="$PR_NUMBER" LOOP_STATUS="completed" BLOCKERS="" \
            bash "$RUNNER_TEMP/agent-control/write-loop-result.sh"
          PR_NUMBER="$PR_NUMBER" bash "$RUNNER_TEMP/agent-control/update-loop-pr-body.sh"
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:reviewing" || true

  report-no-changes:
    needs: implement
    if: ${{ needs.implement.outputs.openai_available == 'true' && needs.implement.outputs.should_publish != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Mark issue for human review
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.implement.outputs.issue_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop completed without producing file changes. Marking for human review."
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:needs-human" || true

  report-failure:
    needs: implement
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Report workflow failure
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.implement.outputs.issue_number }}
        run: |
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:blocked" || true
            gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop failed in GitHub Actions. Check the workflow run logs before retrying."
          fi

  report-publish-failure:
    needs: [implement, publish]
    if: ${{ needs.implement.result == 'success' && needs.publish.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Report publish failure
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.implement.outputs.issue_number }}
        run: |
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" --remove-label "agent:working" --add-label "agent:blocked" || true
            gh issue comment "$ISSUE_NUMBER" --body "Codex issue loop created an implementation patch but failed while publishing the PR. Check the workflow run logs before retrying."
          fi
