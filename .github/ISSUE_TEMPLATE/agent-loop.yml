name: Agent loop task
description: Queue a bounded Codex implementation, bugfix, eval, or frontend loop.
title: "[Loop]: "
labels:
  - agent:ready
  - priority:p2
body:
  - type: markdown
    attributes:
      value: |
        Use this for work that a coding agent can complete as one bounded loop.
        Keep the request tied to one user-visible outcome.
  - type: dropdown
    id: loop
    attributes:
      label: Loop
      description: Pick the loop the worker should run.
      options:
        - feature-build
        - bugfix
        - eval-calibration
        - frontend-fidelity
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - p2
        - p1
        - p0
        - p3
    validations:
      required: true
  - type: checkboxes
    id: surfaces
    attributes:
      label: Surfaces
      options:
        - label: backend
        - label: frontend
        - label: agent-pipeline
        - label: scoring
        - label: integrations
        - label: docs
  - type: checkboxes
    id: risks
    attributes:
      label: Risk flags
      options:
        - label: scoring-change
        - label: outreach-gate
        - label: data-handling
        - label: external-api
  - type: textarea
    id: outcome
    attributes:
      label: User-visible outcome
      description: What should be true when the loop is complete?
      placeholder: A rep can...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List 3-5 concrete checks the agent should satisfy.
      placeholder: |
        - ...
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Relevant docs or files
      description: Link the PRD/spec, route, service, component, or test files.
      placeholder: |
        - backstage/prd/...
        - backend/app/...
        - frontend/src/...
  - type: textarea
    id: verification
    attributes:
      label: Expected verification
      description: Commands or manual checks the agent should run.
      placeholder: |
        - cd backend && uv run pytest -v
        - cd frontend && pnpm test
