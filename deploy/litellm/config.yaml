model_list:
  - model_name: signal-chat
    litellm_params:
      model: os.environ/SIGNAL_LITELLM_UPSTREAM_MODEL
      api_base: os.environ/SIGNAL_LITELLM_UPSTREAM_API_BASE
      api_key: os.environ/SIGNAL_LITELLM_UPSTREAM_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL

litellm_settings:
  drop_params: true
