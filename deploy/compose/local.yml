services:
  postgres:
    ports:
      # Host tools use localhost:5433; Compose services use postgres:5432.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    env_file:
      - path: ../envs/.env.local
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-signal}

  cloudbeaver:
    image: dbeaver/cloudbeaver:26.1.0
    ports:
      - "${DB_UI_PORT:-5050}:8978"
    environment:
      CB_SERVER_NAME: Signal Local DB UI
      CB_SERVER_URL: http://localhost:${DB_UI_PORT:-5050}/
      CB_ADMIN_NAME: signal
      CB_ADMIN_PASSWORD: ${DB_UI_ADMIN_PASSWORD:-signal-local-db-ui}
      CLOUDBEAVER_APP_SUPPORTS_CUSTOM_CONNECTIONS: ${DB_UI_CUSTOM_CONNECTIONS_ENABLED:-true}
    volumes:
      - cloudbeaver_workspace:/opt/cloudbeaver/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8978/"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"

  neo4j:
    ports:
      - "${NEO4J_BROWSER_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    env_file:
      - path: ../envs/.env.local
        required: false
    environment:
      NEO4J_AUTH: ${SIGNAL_NEO4J_USER:-neo4j}/${SIGNAL_NEO4J_PASSWORD:-signal-local-neo4j}

  litellm-db-init:
    image: postgres:16-alpine
    env_file:
      - path: ../envs/.env.local
        required: false
      - path: ../envs/.env.litellm.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        export PGPASSWORD="$${POSTGRES_PASSWORD:-postgres}"
        db_user="$${POSTGRES_USER:-postgres}"
        db_name="$${POSTGRES_DB:-signal}"
        psql -h postgres -U "$${db_user}" -d "$${db_name}" -tAc "SELECT 1 FROM pg_database WHERE datname='litellm'" | grep -q 1 || \
          psql -h postgres -U "$${db_user}" -d "$${db_name}" -c "CREATE DATABASE litellm OWNER \"$${db_user}\""
    restart: "no"

  litellm:
    ports:
      - "${LITELLM_HOST_PORT:-4000}:4000"
    env_file:
      - path: ../envs/.env.litellm.local
        required: false
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-litellm-master-key}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-local-litellm-salt-key-change-me}
      # LiteLLM runs inside Compose, so it uses the Postgres container port.
      LITELLM_DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/litellm}
      SIGNAL_LITELLM_UPSTREAM_MODEL: ${SIGNAL_LITELLM_UPSTREAM_MODEL:-openai/gpt-5.4-mini}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-with-openai-api-key}
    depends_on:
      postgres:
        condition: service_healthy
      litellm-db-init:
        condition: service_completed_successfully

volumes:
  cloudbeaver_workspace:
    name: signal_cloudbeaver_workspace
