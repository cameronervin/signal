services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    env_file:
      - path: ../envs/.env.local
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-signal}

  valkey:
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"

  litellm-db-init:
    image: postgres:16-alpine
    env_file:
      - path: ../envs/.env.local
        required: false
      - path: ../envs/.env.litellm.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        export PGPASSWORD="$${POSTGRES_PASSWORD:-postgres}"
        db_user="$${POSTGRES_USER:-postgres}"
        db_name="$${POSTGRES_DB:-signal}"
        psql -h postgres -U "$${db_user}" -d "$${db_name}" -tAc "SELECT 1 FROM pg_database WHERE datname='litellm'" | grep -q 1 || \
          psql -h postgres -U "$${db_user}" -d "$${db_name}" -c "CREATE DATABASE litellm OWNER \"$${db_user}\""
    restart: "no"

  litellm:
    ports:
      - "${LITELLM_HOST_PORT:-4000}:4000"
    env_file:
      - path: ../envs/.env.litellm.local
        required: false
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-litellm-master-key}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-local-litellm-salt-key-change-me}
      LITELLM_DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/litellm}
      SIGNAL_LITELLM_UPSTREAM_MODEL: ${SIGNAL_LITELLM_UPSTREAM_MODEL:-openai/gpt-5.4-mini}
      SIGNAL_LITELLM_UPSTREAM_API_BASE: ${SIGNAL_LITELLM_UPSTREAM_API_BASE:-https://api.openai.com/v1}
      SIGNAL_LITELLM_UPSTREAM_API_KEY: ${SIGNAL_LITELLM_UPSTREAM_API_KEY:-replace-with-openai-api-key}
    depends_on:
      postgres:
        condition: service_healthy
      litellm-db-init:
        condition: service_completed_successfully
